services:
  - type: web
    name: delivery-app-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: delivery-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: JWT_EXPIRY_MINUTES
        value: "30"
      - key: RATE_LIMIT_MAX_ATTEMPTS
        value: "10"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_BLOCK_MINUTES
        value: "5"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_UPLOAD_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: "product-images"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: zipra-b3c72
      - key: FIREBASE_PROJECT_NUMBER
        value: "571924388974"

databases:
  - name: delivery-db
    plan: free
    region: oregon
    databaseVersion: "16"
    ipAllowList: []
